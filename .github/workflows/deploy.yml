name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prd

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.event_name == 'push' && 'prd' || inputs.environment }}-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'prd' || inputs.environment }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'push' && 'prd' || inputs.environment }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      EXPECTED_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '822013579886' }}
      # Keeps the CDK target region identical to the credentials region below.
      CDK_DEPLOY_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Validate AWS deployment configuration
        run: |
          if [ -z "${AWS_DEPLOY_ROLE_ARN}" ]; then
            echo "::error::AWS_DEPLOY_ROLE_ARN is not configured for the ${DEPLOY_ENV} GitHub Environment."
            exit 1
          fi
          # Checked before assuming the role: a stale ARN otherwise surfaces as
          # an opaque "Not authorized to perform sts:AssumeRoleWithWebIdentity".
          role_account=$(echo "${AWS_DEPLOY_ROLE_ARN}" | cut -d: -f5)
          if [ "${role_account}" != "${EXPECTED_AWS_ACCOUNT_ID}" ]; then
            echo "::error::AWS_DEPLOY_ROLE_ARN for the ${DEPLOY_ENV} environment points at account ${role_account}, expected ${EXPECTED_AWS_ACCOUNT_ID}. Update the environment variable to the role in ${EXPECTED_AWS_ACCOUNT_ID}."
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - run: pnpm --filter @devtoys/infra run "deploy:${DEPLOY_ENV}"
