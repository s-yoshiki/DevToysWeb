packages:
  - apps/*
  - scripts/*

confirmModulesPurge: false

allowBuilds:
  esbuild: true
  # msw's postinstall only prints a funding notice; the worker script is committed
  # to apps/web/public and refreshed with `pnpm --filter @devtoys/web mock:init`.
  msw: false
  sharp: true

onlyBuiltDependencies:
  - sharp
